<div>
  <div class="brand-logo__wrp">
    <img
      class="brand-logo"
      [src]="'assets/img/brands/' + brand?.imgUrl"
      [alt]="brand?.name"
    />
  </div>
  <app-brand-name-list></app-brand-name-list>
</div>

<div class="brand__card">
  <h1>{{ brand?.name }}</h1>

  @if (brand?.links) {
  <h3>Каталоги</h3>
  <ul class="catalog">
    @for(link of brand?.links; track link.url) {
    <li class="catalog__list">
      <p>
        <a class="catalog__link" [href]="link.url" target="_blank">{{
          link.title
        }}</a>
      </p>
    </li>
    }
  </ul>
  }

  <p class="brand-description">{{ brand?.desc }}</p>
</div>
